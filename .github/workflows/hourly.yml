name: Hourly Pattern Detection

on:
  schedule:
    - cron: '0 * * * *'   # Every hour at :00 UTC
  workflow_dispatch:        # Allow manual trigger

jobs:
  drift:
    name: Drift Detection
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run drift.py
        run: python drift.py

  sudden:
    name: Sudden Drop/Spike Detection
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run sudden.py
        run: python sudden.py
