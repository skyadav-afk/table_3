name: Daily Pattern Detection

on:
  schedule:
    - cron: '55 23 * * *'  # Every day at 23:55 UTC
  workflow_dispatch:         # Allow manual trigger

jobs:
  staging:
    name: Refresh Staging Table
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run stagging.py
        run: python stagging.py

  daily:
    name: Daily Pattern Promotion
    runs-on: ubuntu-latest
    needs: staging
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run daily.py
        run: python daily.py

  volume:
    name: Volume-Driven Pattern Detection
    runs-on: ubuntu-latest
    needs: staging
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run volume1.py
        run: python volume1.py
